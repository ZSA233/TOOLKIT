name: setup-toolkit
description: Set up Python, Go, and optional Node/pnpm dependencies for toolkit workflows.

inputs:
  python-version:
    description: Python version for release tooling.
    default: "3.11"
  go-version-file:
    description: Path to the Go module used for setup-go.
    default: services/mtu_tuner/go.mod
  node-version:
    description: Node.js version for GUI frontend builds.
    default: "20"
  pnpm-version:
    description: pnpm version for GUI frontend builds.
    default: "9"
  pnpm-lock-file:
    description: Path to the frontend pnpm lockfile used for cache lookup.
    default: services/mtu_tuner/cmd/gui/frontend/pnpm-lock.yaml
  install-node:
    description: Whether to install Node.js and pnpm.
    default: "false"
  install-linux-gui-deps:
    description: Whether to install Linux GUI system packages for Wails builds.
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.go-version-file }}

    - name: Install GNU Make on Windows
      if: ${{ runner.os == 'Windows' }}
      shell: powershell
      run: choco install make --no-progress --yes

    - name: Set up pnpm
      if: ${{ inputs.install-node == 'true' }}
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Set up Node.js
      if: ${{ inputs.install-node == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.pnpm-lock-file }}

    - name: Install Linux GUI dependencies
      if: ${{ inputs.install-linux-gui-deps == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev
